<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#6A42A8" />
  <meta property="og:title" content="보기 - 보드게임을 함께 보기" />
  <meta property="og:description" content="공유된 보유 목록을 앱에서 열어보세요." />
  <meta property="og:image" content="https://www.bogi.ai.kr/assets/images/bogi-play-icon-512.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="../assets/images/bogi-play-icon-512.png" />
  <link rel="apple-touch-icon" href="../assets/images/bogi-play-icon-512.png" />
  <title>보기 - 보드게임을 함께 보기</title>
  <style>
    :root {
      --purple-base: #6a42a8;
      --purple-deep: #4b2c82;
      --purple-hi: #b8a9d9;
      --bg-deep: #1a0f2e;
      --bg-mid: #241436;
      --text: #faf5ff;
      --muted: #b8a9d9;
      --text-soft: #e9d5ff;
      --card: rgba(184, 169, 217, 0.1);
      --card-border: rgba(184, 169, 217, 0.22);
      --radius: 16px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background:
        radial-gradient(1000px 520px at 50% -18%, rgba(106, 66, 168, 0.5) 0%, transparent 55%),
        radial-gradient(700px 400px at 10% 40%, rgba(75, 44, 130, 0.35) 0%, transparent 50%),
        linear-gradient(180deg, var(--bg-mid) 0%, var(--bg-deep) 100%);
      color: var(--text);
      padding: 28px 20px 40px;
    }
    .wrap { max-width: 420px; margin: 0 auto; }
    .brand {
      text-align: center;
      margin-bottom: 22px;
    }
    .logo-img {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      display: inline-block;
      box-shadow:
        0 0 0 1px rgba(184, 169, 217, 0.35),
        0 10px 36px rgba(75, 44, 130, 0.4);
    }
    h1 {
      font-size: 1.28rem;
      font-weight: 900;
      letter-spacing: -0.03em;
      margin: 14px 0 6px;
      color: var(--text);
    }
    .title-sub {
      display: block;
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--text-soft);
      margin-bottom: 0;
      letter-spacing: -0.02em;
    }
    p.lead {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.55;
      text-align: center;
      font-weight: 500;
    }
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 14px;
      border: 1px solid var(--card-border);
    }
    .id-label { font-size: 0.75rem; color: var(--muted); margin-bottom: 6px; }
    .id-value {
      font-family: ui-monospace, monospace;
      font-size: 0.9rem;
      word-break: break-all;
      color: var(--text-soft);
    }
    .btn {
      display: block;
      width: 100%;
      text-align: center;
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
      padding: 14px 18px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:active { opacity: 0.9; }
    .btn-primary {
      background: linear-gradient(145deg, #8b5bcf 0%, var(--purple-base) 45%, var(--purple-deep) 100%);
      color: #ffffff;
      margin-bottom: 10px;
      border: 1px solid rgba(184, 169, 217, 0.35);
      text-shadow: 0 1px 0 rgba(61, 31, 102, 0.2);
    }
    .btn-store {
      background: rgba(184, 169, 217, 0.12);
      color: var(--text-soft);
      margin-bottom: 8px;
      border: 1px solid rgba(184, 169, 217, 0.25);
    }
    .muted {
      font-size: 0.82rem;
      color: var(--muted);
      text-align: center;
      margin-top: 20px;
      line-height: 1.45;
      font-weight: 500;
    }
    .err {
      color: #f0abfc;
      font-size: 0.9rem;
      margin: 12px 0 0;
    }
  </style>
  <!--
    레포: bogi_web/share/index.html → git push 후 미니 PC 에서 pull, nginx root 가 그 디렉터리를 가리키게 두면 됨.

    nginx 예 (root 를 bogi_web 클론 루트로 둔 경우 — 경로는 서버에 맞게 조정):
      root /srv/bogi_web;
      location ~ ^/share/[^/]+$ {
        try_files /share/index.html =404;
      }

    요청 URL 은 https://www.bogi.ai.kr/share/공유ID 형태로 유지되고, 같은 index.html 이 응답해야 JS 가 ID 를 읽을 수 있음.
  -->
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <img
        class="logo-img"
        src="../assets/images/bogi-play-icon-512.png"
        width="72"
        height="72"
        alt=""
      />
      <h1>보기<span class="title-sub">보드게임을 함께 보기</span></h1>
    </div>
    <p class="lead">공유된 보유 보드게임 목록을 앱에서 열 수 있습니다. 앱이 설치되어 있지 않다면 아래에서 받아 주세요.</p>

    <div class="card" id="state-id">
      <div class="id-label">공유 ID</div>
      <div class="id-value" id="share-id-el">—</div>
      <p class="err" id="share-err" hidden></p>
    </div>

    <div id="actions" hidden>
      <button type="button" class="btn btn-primary" id="btn-open-app">앱에서 열기</button>
      <a class="btn btn-store" id="link-ios" href="#" target="_blank" rel="noopener">App Store에서 받기</a>
      <a class="btn btn-store" id="link-android" href="#" target="_blank" rel="noopener">Google Play에서 받기</a>
    </div>

    <p class="muted">자동으로 앱 실행을 시도합니다. 열리지 않으면 아래 버튼을 눌러 주세요. 카카오톡 브라우저는 막힐 수 있어 Safari·Chrome 권장. 자동 시도 비활성: URL 에 <code>?noauto=1</code> 추가.</p>
  </div>

  <script>
(function () {
  /** 운영 시 App Store / Play 링크만 맞추면 됩니다. */
  var APP_STORE_URL = "https://apps.apple.com/app/id6762985055";
  var PLAY_STORE_URL = "https://play.google.com/store/apps/details?id=com.ojs7572.bogi_front";
  var ANDROID_PACKAGE = "com.ojs7572.bogi_front";

  var path = window.location.pathname || "";
  var m = path.match(/\/share\/([^/]+)\/?$/);
  var shareId = m ? decodeURIComponent(m[1]) : "";

  var elId = document.getElementById("share-id-el");
  var elErr = document.getElementById("share-err");
  var elActions = document.getElementById("actions");
  var btnApp = document.getElementById("btn-open-app");
  var linkIos = document.getElementById("link-ios");
  var linkAndroid = document.getElementById("link-android");

  linkIos.href = APP_STORE_URL;
  linkAndroid.href = PLAY_STORE_URL;

  if (!shareId) {
    elId.textContent = "(없음)";
    elErr.hidden = false;
    elErr.textContent = "주소 형식이 올바르지 않습니다. 예: …/share/공유ID";
    elActions.hidden = false;
    return;
  }

  elId.textContent = shareId;
  elActions.hidden = false;

  var qs = new URLSearchParams(window.location.search || "");
  var noAuto = qs.get("noauto") === "1" || qs.get("manual") === "1";

  function openInApp() {
    var encoded = encodeURIComponent(shareId);
    var custom = "bogi://share/" + encoded;
    var ua = navigator.userAgent || "";
    if (/Android/i.test(ua)) {
      var intent =
        "intent://share/" + encoded +
        "#Intent;scheme=bogi;package=" + ANDROID_PACKAGE + ";end";
      window.location.href = intent;
      return;
    }
    window.location.href = custom;
  }

  btnApp.addEventListener("click", function (e) {
    e.preventDefault();
    openInApp();
  });

  /** 랜딩 후 곧바로 앱 스킴 호출(카카오 등 인앱브라우저는 차단될 수 있음). 끄려면 ?noauto=1 */
  if (!noAuto) {
    setTimeout(function () {
      openInApp();
    }, 160);
  }
})();
  </script>
</body>
</html>

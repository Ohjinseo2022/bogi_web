# bogi_web 정적 사이트 — 컨테이너 내부 nginx
# 이미지 빌드 시 /usr/share/nginx/html 에 HTML·assets 복사

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    location /assets/ {
        try_files $uri =404;
        expires 7d;
        access_log off;
    }

    location ~ ^/share/[^/]+/?$ {
        try_files /share/index.html =404;
    }

    location = /privacy-policy {
        try_files /privacy-policy.html =404;
    }

    location = /account-deletion {
        try_files /account-deletion.html =404;
    }

    location = / {
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
